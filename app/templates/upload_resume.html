{% extends "base.html" %}
{% block title %}Upload Resume{% endblock %}

{% block navbar %}
{% include "partials/admin_navbar.html" %}
{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-4">Upload Resume</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Select Resume (PDF only)</label>
          <input type="file" name="resume" class="form-control" accept=".pdf" required>
        </div>
        <button type="submit" class="btn btn-primary"><i class="bi bi-upload"></i> Upload Resume</button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
