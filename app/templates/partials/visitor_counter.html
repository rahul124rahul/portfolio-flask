<!-- Visitor Counter Widget -->
<div class="visitor-counter-widget">
  <div class="visitor-stat">
    <div class="visitor-number" id="visitorCount">0</div>
    <div class="visitor-label">Visitors</div>
  </div>
  <div class="visitor-stat">
    <div class="visitor-number" id="visitorToday">0</div>
    <div class="visitor-label">Today</div>
  </div>
  <div class="visitor-stat">
    <div class="visitor-number" id="uniqueCountries">0</div>
    <div class="visitor-label">Countries</div>
  </div>
</div>

<script>
(function() {
  // Fetch visitor stats from admin API
  fetch('/api/visitor-stats')
    .then(r => r.json())
    .then(data => {
      document.getElementById('visitorCount').textContent = (data.total || 0).toLocaleString();
      document.getElementById('visitorToday').textContent = (data.today || 0).toLocaleString();
      document.getElementById('uniqueCountries').textContent = (data.countries || 0).toLocaleString();
    })
    .catch(err => {
      // Fallback if API unavailable
      document.getElementById('visitorCount').textContent = '?';
      document.getElementById('visitorToday').textContent = '?';
      document.getElementById('uniqueCountries').textContent = '?';
    });
})();
</script>
