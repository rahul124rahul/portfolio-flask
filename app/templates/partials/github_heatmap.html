<!-- GitHub Activity Section -->
{% if github_username %}
<section class="py-5 bg-light" id="github-heatmap" data-aos="fade-up">
  <div class="container">
    <h2 class="text-center mb-4 fw-bold">Developer Activity</h2>
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <!-- User Stats Card -->
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="mb-0"><i class="bi bi-github me-2"></i>GitHub Profile: {{ github_username }}</h5>
              <a href="https://github.com/{{ github_username }}" target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-light">
                <i class="bi bi-box-arrow-up-right"></i> Visit Profile
              </a>
            </div>
          </div>
          <div class="card-body">
            <div id="githubStatsContainer" class="row g-4">
              <div class="col-md-3">
                <div class="text-center">
                  <div class="spinner-border text-primary spinner-border-sm mb-2" role="status">
                    <span class="visually-hidden">Loading...</span>
                  </div>
                  <h6 class="text-muted">Loading stats...</h6>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Repos Card -->
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-collection me-2"></i>Recent Repositories</h5>
          </div>
          <div class="card-body">
            <div id="githubReposContainer">
              <div class="text-center">
                <div class="spinner-border text-primary spinner-border-sm mb-2" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted">Fetching repositories...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function() {
  var github_username = "{{ github_username }}";
  if (!github_username) return;

  // Fetch user stats
  function fetchUserStats() {
    fetch(`https://api.github.com/users/${github_username}`)
      .then(r => {
        if (!r.ok) throw new Error('User not found');
        return r.json();
      })
      .then(user => {
        var statsHTML = `
          <div class="col-md-3">
            <div class="text-center">
              <h4 class="text-primary">${user.public_repos || 0}</h4>
              <small class="text-muted">Public Repos</small>
            </div>
          </div>
          <div class="col-md-3">
            <div class="text-center">
              <h4 class="text-primary">${user.followers || 0}</h4>
              <small class="text-muted">Followers</small>
            </div>
          </div>
          <div class="col-md-3">
            <div class="text-center">
              <h4 class="text-primary">${user.following || 0}</h4>
              <small class="text-muted">Following</small>
            </div>
          </div>
          <div class="col-md-3">
            <div class="text-center">
              <h4 class="text-primary">${user.public_gists || 0}</h4>
              <small class="text-muted">Public Gists</small>
            </div>
          </div>
        `;
        document.getElementById('githubStatsContainer').innerHTML = statsHTML;
      })
      .catch(err => {
        document.getElementById('githubStatsContainer').innerHTML = `
          <div class="col-12">
            <div class="alert alert-warning mb-0">
              <i class="bi bi-exclamation-triangle"></i> Could not fetch GitHub stats: ${err.message}
            </div>
          </div>
        `;
      });
  }

  // Fetch user repos
  function fetchRepos() {
    fetch(`https://api.github.com/users/${github_username}/repos?per_page=10&sort=updated&type=owner`)
      .then(r => {
        if (!r.ok) throw new Error('Repos not found');
        return r.json();
      })
      .then(repos => {
        if (!Array.isArray(repos) || repos.length === 0) {
          document.getElementById('githubReposContainer').innerHTML = `
            <p class="text-muted text-center">No repositories found</p>
          `;
          return;
        }

        var reposHTML = '<div class="row g-3">';
        repos.forEach(repo => {
          var lang = repo.language || 'Unknown';
          var stars = repo.stargazers_count || 0;
          var forks = repo.forks_count || 0;
          var desc = repo.description || 'No description';

          reposHTML += `
            <div class="col-12">
              <div class="card border-0 bg-white h-100">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-start mb-2">
                    <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="card-title text-decoration-none fw-bold">
                      ${repo.name}
                    </a>
                    <span class="badge bg-secondary">${lang}</span>
                  </div>
                  <p class="card-text small text-muted mb-2">${desc.substring(0, 100)}</p>
                  <div class="d-flex gap-3 small">
                    <span><i class="bi bi-star-fill text-warning"></i> ${stars}</span>
                    <span><i class="bi bi-diagram-2 text-info"></i> ${forks}</span>
                    <span><i class="bi bi-calendar2 text-secondary"></i> ${new Date(repo.updated_at).toLocaleDateString()}</span>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        reposHTML += '</div>';
        document.getElementById('githubReposContainer').innerHTML = reposHTML;
      })
      .catch(err => {
        document.getElementById('githubReposContainer').innerHTML = `
          <div class="alert alert-warning mb-0">
            <i class="bi bi-exclamation-triangle"></i> Could not fetch repositories: ${err.message}
          </div>
        `;
      });
  }

  // Fetch on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      fetchUserStats();
      fetchRepos();
    });
  } else {
    fetchUserStats();
    fetchRepos();
  }
})();
</script>

<style>
#github-heatmap {
  background: #f8f9fa !important;
}

[data-bs-theme="dark"] #github-heatmap {
  background: #1a1a1a !important;
}

#github-heatmap .card {
  border: 1px solid rgba(102, 126, 234, 0.2);
}

#github-heatmap .card-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
}

#github-heatmap .text-primary {
  color: #667eea !important;
}

#github-heatmap a {
  color: #667eea;
  transition: color 0.3s ease;
}

#github-heatmap a:hover {
  color: #764ba2;
}
</style>
{% endif %}
