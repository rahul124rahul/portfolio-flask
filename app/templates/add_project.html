{% extends "base.html" %}
{% block title %}Add Project{% endblock %}

{% block navbar %}
{% include "partials/admin_navbar.html" %}
{% endblock %}

{% block content %}
<div class="container mt-4" style="max-width: 700px;">
  <h2 class="mb-4">Add New Project</h2>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">Project Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Description <span class="text-danger">*</span></label>
          <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">GitHub Link</label>
          <input type="url" name="github" class="form-control" placeholder="https://github.com/...">
        </div>

        <div class="mb-3">
          <label class="form-label">Live Demo Link</label>
          <input type="url" name="demo" class="form-control" placeholder="https://...">
        </div>

        <div class="mb-3">
          <label class="form-label">Project Image</label>
          <input type="file" name="image" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add Project</button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
