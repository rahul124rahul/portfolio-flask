version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=mysql+pymysql://portfolio:portfolio_pass@db:3306/portfolio_db
      - FLASK_DEBUG=false
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret}
      - SITE_URL=${SITE_URL:-http://localhost:5000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/app/static/uploads

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: portfolio_db
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: portfolio_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  uploads:
